<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Prêt hypothécaire </title>
    <link rel="stylesheet" href="Stylecalculateur.css">
</head>
<body>
    <div id="conteneur">
        <h1>Calculateur de prêt hypothécaire</h1>
        <div class="element">
            <label>Montant du prêt :</label>
            <input type="number" id="montant"><br><br>
        </div>
        <div class="element">
            <label>Taux d'intérêt annuel (%) :</label>
            <input type="number" id="taux"><br><br>
        </div>
        <div class="element">
            <label>Durée (années) :</label>
            <input type="number" id="duree"><br><br>
        </div>
        <button onclick="calculer()">Calculer le paiement mensuel</button>
        <p id="resultat"></p>
    </div>
    <footer>
        <div class="copyright">
            <p>Designed by [<span>ALLOGO NDONG Jordy</span>] with HTML, CSS at JavaScript </p>
            <p>Tous droits réservés - 2025</p>
        </div>
    </footer>
    <script>
    function calculer() {
        let P = parseFloat(document.getElementById("montant").value);
        let tauxAnnuel = parseFloat(document.getElementById("taux").value);
        let dureeAnnees = parseInt(document.getElementById("duree").value);
        if (isNaN(P) || isNaN(tauxAnnuel) || isNaN(dureeAnnees) || P <= 0 || tauxAnnuel <= 0 || dureeAnnees <= 0) {
            alert("Veuillez entrer des valeurs valides !");
            return;
        }
        let r = (tauxAnnuel / 100) / 12;
        let n = dureeAnnees * 12;
        let M = P * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
        document.getElementById("resultat").textContent =
        "Paiement mensuel : " + M.toFixed(2) + " FCFA";
    }
    </script>
</body>
</html>
